services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    command: gunicorn --bind 0.0.0.0:5000 "__init__:create_app()"
    volumes:
      - static_volume:/home/app/static
    expose:
      - 5000
    env_file:
      - .env.prod
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data/
    env_file:
      - .env.prod.db

  nginx:
    build: ./nginx
    volumes:
      - static_volume:/home/app/static
    ports:
      - "5101:80"
    depends_on:
      - web

volumes:
  postgres_data_prod:
  static_volume:
